catalog:
  '@arethetypeswrong/cli': ^0.18.2
  '@earendil-works/pi-ai': ^0.74.0
  '@mdream/crawl': ^1.1.0
  '@types/semver': ^7.7.1
  bumpp: ^11.1.0
  giget: ^3.2.0
  hookable: ^6.1.1
  jsonc-parser: ^3.3.1
  mdream: ^1.1.0
  ofetch: ^1.5.1
  pathe: ^2.0.3
  publint: ^0.3.0
  retriv: ^0.13.2
  semver: ^7.8.0
  std-env: ^4.1.0
  tsx: ^4.21.0
  typebox: ^1.1.38
  typescript: 6.0.3
  unagent: ^0.0.8
  zod: ^4.4.3
catalogs:
  deps:
    '@clack/prompts': ^1.4.0
    '@huggingface/transformers': ^4.2.0
    citty: ^0.2.2
    consola: ^3.4.2
    log-update: ^8.0.0
    oxc-parser: ^0.130.0
    p-limit: ^7.3.0
    sqlite-vec: ^0.1.9
  dev-build:
    '@types/node': ^25.7.0
    obuild: ^0.4.35
  dev-lint:
    '@antfu/eslint-config': ^9.0.0
    eslint: ^9.39.2
  dev-test:
    '@vitest/coverage-v8': ^4.1.6
    vitest: ^4.1.6

onlyBuiltDependencies:
